    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=compute-${{ github.event.inputs.environment }}.tfstate"

      - name: Apply
        run: tofu apply -auto-approve -var-file=env/${{ github.event.inputs.environment }}.tfvars