name: deploy-all-infra

concurrency:
  group: infra-global
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod

permissions:
  contents: read

##########################################################
# STEP 1 — NETWORK
##########################################################

jobs:

  network:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure/network

    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=network-${{ github.event.inputs.environment }}.tfstate"

      - name: Plan
        id: plan
        run: |
          set +e
          tofu plan \
            -var-file=env/${{ github.event.inputs.environment }}.tfvars \
            -out=tfplan \
            -detailed-exitcode
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "$exitcode" -eq 1 ]; then
            exit 1
          fi
        shell: bash

  network_apply:
    needs: network
    if: needs.network.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: azure/network

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=network-${{ github.event.inputs.environment }}.tfstate"

      - name: Apply
        run: tofu apply -auto-approve tfplan


##########################################################
# STEP 2 — SECURITY
##########################################################

  security:
    needs: network_apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure/security

    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=security-${{ github.event.inputs.environment }}.tfstate"

      - name: Plan
        id: plan
        run: |
          set +e
          tofu plan \
            -var-file=env/${{ github.event.inputs.environment }}.tfvars \
            -out=tfplan \
            -detailed-exitcode
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "$exitcode" -eq 1 ]; then
            exit 1
          fi
        shell: bash

  security_apply:
    needs: security
    if: needs.security.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: azure/security

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=security-${{ github.event.inputs.environment }}.tfstate"

      - name: Apply
        run: tofu apply -auto-approve tfplan


##########################################################
# STEP 3 — COMPUTE
##########################################################

  compute:
    needs: security_apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure/compute

    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=compute-${{ github.event.inputs.environment }}.tfstate"

      - name: Plan
        id: plan
        run: |
          set +e
          tofu plan \
            -var-file=env/${{ github.event.inputs.environment }}.tfvars \
            -var="environment=${{ github.event.inputs.environment }}" \
            -out=tfplan \
            -detailed-exitcode
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ "$exitcode" -eq 1 ]; then
            exit 1
          fi
        shell: bash

  compute_apply:
    needs: compute
    if: needs.compute.outputs.exitcode == '2'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: azure/compute

    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Init
        run: tofu init -backend-config="key=compute-${{ github.event.inputs.environment }}.tfstate"

      - name: Apply
        run: tofu apply -auto-approve tfplan